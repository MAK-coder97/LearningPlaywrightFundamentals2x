<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f2f4f8;
    }
    .login-card {
      width: 320px;
      padding: 32px 28px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }
    .login-card h1 {
      margin: 0 0 24px;
      font-size: 22px;
      text-align: center;
      color: #1a1a2e;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #444;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .field input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }
    .submit-btn {
      width: 100%;
      padding: 11px;
      margin-top: 4px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #4f46e5;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .submit-btn:hover { background: #4338ca; }
    .forgot {
      display: block;
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: #4f46e5;
      text-decoration: none;
    }
    .forgot:hover { text-decoration: underline; }
    .message {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <form class="login-card" id="loginForm">
    <h1>Sign In</h1>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter username" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required />
    </div>

    <button type="submit" class="submit-btn" id="submit">Submit</button>

    <a href="#" class="forgot" id="forgotPassword">Forgot password?</a>

    <p class="message" id="message"></p>
  </form>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if (user === "admin" && pass === "pass123") {
        message.style.color = "#16a34a";
        message.textContent = "Login successful!";
      } else {
        message.style.color = "#dc2626";
        message.textContent = "Invalid username or password.";
      }
    });

    document.getElementById("forgotPassword").addEventListener("click", function (e) {
      e.preventDefault();
      message.style.color = "#4f46e5";
      message.textContent = "Password reset link sent (demo).";
    });
  </script>
</body>
</html>
